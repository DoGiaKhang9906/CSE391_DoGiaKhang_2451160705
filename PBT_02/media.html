<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia</title>
</head>
<body>

    <h1>Giới thiệu sản phẩm</h1>

    <!-- 🔹 3 ảnh sản phẩm -->
    <section>
        <h2>Sản phẩm nổi bật</h2>

        <figure>
            <img src="https://placehold.co/300x200"
                 alt="iPhone 16 Pro Max màu Titan, mặt trước và sau"
                 loading="lazy"
                 style="max-width:100%; height:auto;">
            <figcaption>iPhone 16 Pro Max — 25.990.000đ</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/300x200"
                 alt="iPhone 16 màu xanh dương, thiết kế camera kép"
                 loading="lazy"
                 style="max-width:100%; height:auto;">
            <figcaption>iPhone 16 — 21.990.000đ</figcaption>
        </figure>

        <figure>
            <img src="https://placehold.co/300x200"
                 alt="iPhone 16 Plus màu hồng, màn hình lớn"
                 loading="lazy"
                 style="max-width:100%; height:auto;">
            <figcaption>iPhone 16 Plus — 23.990.000đ</figcaption>
        </figure>
    </section>

    <!-- 🔹 Video YouTube -->
    <section>
        <h2>Video giới thiệu (YouTube)</h2>

        <iframe width="560" height="315"
            src="https://www.youtube.com/embed/VIDEO_ID"
            title="YouTube video"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </section>

    <!-- 🔹 Video HTML5 -->
    <section>
        <h2>Video sản phẩm</h2>

        <video controls poster="https://placehold.co/600x300">
            <source src="video.mp4" type="video/mp4">
            <source src="video.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ video.
        </video>
    </section>

    <!-- 🔹 Audio -->
    <section>
        <h2>Nhạc nền</h2>

        <audio controls>
            <source src="audio.mp3" type="audio/mpeg">
            Trình duyệt không hỗ trợ audio.
        </audio>
    </section>

    <!-- 🔹 SVG -->
    <section>
        <h2>Logo (SVG)</h2>

        <svg width="100" height="100">
            <circle cx="50" cy="50" r="40" fill="blue" />
            <text x="50" y="55" text-anchor="middle" fill="white" font-size="14">
                Shop
            </text>
        </svg>
    </section>

</body>
</html>
